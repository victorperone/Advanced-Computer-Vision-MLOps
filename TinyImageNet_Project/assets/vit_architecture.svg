<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 1120" width="100%" height="1120">

<style>
  .bg-input    { fill:#E3F2FD; stroke:#1565C0; stroke-width:1.5 }
  .bg-patch    { fill:#E8F5E9; stroke:#2E7D32; stroke-width:1.5 }
  .bg-embed    { fill:#EDE7F6; stroke:#4527A0; stroke-width:1.5 }
  .bg-block    { fill:#F3E5F5; stroke:#6A1B9A; stroke-width:1.5 }
  .bg-cls      { fill:#FFF8E1; stroke:#F57F17; stroke-width:1.5 }
  .bg-head     { fill:#FCE4EC; stroke:#880E4F; stroke-width:1.5 }
  .bg-note     { fill:#F5F5F5; stroke:#9E9E9E; stroke-width:1; stroke-dasharray:4 3 }
  .arrow       { stroke:#455A64; stroke-width:1.8; marker-end:url(#arr) }
  .label-main  { font-family:Arial,sans-serif; font-size:14px; font-weight:700; fill:#212121 }
  .label-sub   { font-family:Arial,sans-serif; font-size:12px; fill:#455A64 }
  .label-shape { font-family:'Courier New',monospace; font-size:11px; fill:#6A1B9A }
  .label-note  { font-family:Arial,sans-serif; font-size:11px; fill:#616161; font-style:italic }
</style>

<defs>
  <marker id="arr" markerWidth="9" markerHeight="9" refX="8" refY="3" orient="auto">
    <polygon points="0 0, 9 3, 0 6" fill="#455A64"/>
  </marker>
</defs>

<!-- ── Title ────────────────────────────────────────────────────────────── -->
<text x="320" y="28" text-anchor="middle" font-family="Arial,sans-serif"
      font-size="17" font-weight="700" fill="#1A237E">Improved Vision Transformer (ViT)</text>
<text x="320" y="46" text-anchor="middle" class="label-sub">64×64 Tiny ImageNet — scratch training</text>

<!-- ── 1. Input ─────────────────────────────────────────────────────────── -->
<rect class="bg-input" x="170" y="60" width="300" height="52" rx="6"/>
<text x="320" y="82" text-anchor="middle" class="label-main">Input Image</text>
<text x="320" y="99" text-anchor="middle" class="label-shape">(B, 64, 64, 3)</text>

<line class="arrow" x1="320" y1="112" x2="320" y2="138"/>

<!-- ── 2. ImageNet standardisation ─────────────────────────────────────── -->
<rect class="bg-patch" x="170" y="138" width="300" height="52" rx="6"/>
<text x="320" y="160" text-anchor="middle" class="label-main">ImageNet Standardisation</text>
<text x="320" y="177" text-anchor="middle" class="label-sub">μ=[0.485,0.456,0.406]  σ=[0.229,0.224,0.225]</text>

<line class="arrow" x1="320" y1="190" x2="320" y2="216"/>

<!-- ── 3. Patch Creator ─────────────────────────────────────────────────── -->
<rect class="bg-patch" x="170" y="216" width="300" height="64" rx="6"/>
<text x="320" y="238" text-anchor="middle" class="label-main">Patch Creator</text>
<text x="320" y="255" text-anchor="middle" class="label-sub">8×8 grid  →  64 non-overlapping patches</text>
<text x="320" y="272" text-anchor="middle" class="label-shape">(B, 64, 192)  [8·8·3 = 192]</text>

<!-- Side note -->
<rect class="bg-note" x="490" y="222" width="130" height="36" rx="4"/>
<text x="555" y="237" text-anchor="middle" class="label-note">patch_size=8</text>
<text x="555" y="251" text-anchor="middle" class="label-note">64÷8=8 → 64 patches</text>
<line stroke="#9E9E9E" stroke-width="1" x1="490" y1="240" x2="470" y2="248"/>

<line class="arrow" x1="320" y1="280" x2="320" y2="306"/>

<!-- ── 4. Patch Encoder ─────────────────────────────────────────────────── -->
<rect class="bg-embed" x="150" y="306" width="340" height="80" rx="6"/>
<text x="320" y="328" text-anchor="middle" class="label-main">Patch Encoder</text>
<text x="320" y="346" text-anchor="middle" class="label-sub">Dense projection  192 → projection_dim</text>
<text x="320" y="363" text-anchor="middle" class="label-sub">+ Learnable Positional Embedding (65 positions)</text>
<text x="320" y="378" text-anchor="middle" class="label-shape">(B, 65, proj_dim)  ← [CLS] prepended</text>

<!-- Side note -->
<rect class="bg-note" x="510" y="318" width="120" height="42" rx="4"/>
<text x="570" y="334" text-anchor="middle" class="label-note">laptop: dim=32</text>
<text x="570" y="348" text-anchor="middle" class="label-note">desktop: dim=128</text>
<line stroke="#9E9E9E" stroke-width="1" x1="510" y1="338" x2="490" y2="346"/>

<line class="arrow" x1="320" y1="386" x2="320" y2="412"/>

<!-- ── 5. Transformer Block (repeated) ─────────────────────────────────── -->
<rect class="bg-block" x="130" y="412" width="380" height="232" rx="8"/>
<text x="320" y="432" text-anchor="middle" class="label-main">Transformer Encoder Block  × L</text>

<!-- LayerNorm 1 -->
<rect fill="#F9F0FF" stroke="#7B1FA2" stroke-width="1" x="190" y="444" width="260" height="34" rx="4"/>
<text x="320" y="466" text-anchor="middle" class="label-sub">LayerNorm  (pre-norm)</text>

<line class="arrow" x1="320" y1="478" x2="320" y2="494"/>

<!-- MHA -->
<rect fill="#F9F0FF" stroke="#7B1FA2" stroke-width="1" x="190" y="494" width="260" height="40" rx="4"/>
<text x="320" y="511" text-anchor="middle" class="label-main">Multi-Head Self-Attention</text>
<text x="320" y="527" text-anchor="middle" class="label-sub">key_dim = proj_dim ÷ num_heads   ← bug fixed</text>

<line class="arrow" x1="320" y1="534" x2="320" y2="550"/>

<!-- Stochastic Depth -->
<rect fill="#FFF3E0" stroke="#E65100" stroke-width="1" x="190" y="550" width="260" height="28" rx="4"/>
<text x="320" y="569" text-anchor="middle" class="label-sub">Stochastic Depth (DropPath)  — new</text>

<!-- Residual add 1 -->
<text x="156" y="595" text-anchor="middle" class="label-sub">⊕</text>
<line stroke="#7B1FA2" stroke-width="1" x1="156" y1="418" x2="156" y2="604"/>
<line stroke="#7B1FA2" stroke-width="1" x1="156" y1="604" x2="190" y2="604"/>
<text x="320" y="598" text-anchor="middle" class="label-note">residual add</text>

<line class="arrow" x1="320" y1="578" x2="320" y2="610"/>

<!-- LayerNorm 2 + FFN -->
<rect fill="#F9F0FF" stroke="#7B1FA2" stroke-width="1" x="190" y="612" width="260" height="22" rx="4"/>
<text x="320" y="628" text-anchor="middle" class="label-sub">LayerNorm  +  FFN (Dense·GELU·Dropout·Dense)</text>

<line class="arrow" x1="320" y1="634" x2="320" y2="648"/>

<!-- Block output shape -->
<text x="320" y="637" text-anchor="middle" class="label-shape"/>
<text x="400" y="638" class="label-note">proj_dim × 4 hidden</text>

<!-- Note: stochastic depth schedule -->
<rect class="bg-note" x="10" y="510" width="118" height="42" rx="4"/>
<text x="69" y="527" text-anchor="middle" class="label-note">depth rate grows</text>
<text x="69" y="541" text-anchor="middle" class="label-note">linearly 0→dropout</text>
<line stroke="#9E9E9E" stroke-width="1" x1="128" y1="533" x2="190" y2="565"/>

<!-- Repeat brace -->
<text x="320" y="656" text-anchor="middle" class="label-shape">(B, 65, proj_dim)  — unchanged shape</text>
<text x="116" y="528" text-anchor="end" class="label-note">L layers</text>

<line class="arrow" x1="320" y1="644" x2="320" y2="668"/>

<!-- ── 6. LayerNorm final ───────────────────────────────────────────────── -->
<rect class="bg-embed" x="190" y="668" width="260" height="34" rx="6"/>
<text x="320" y="690" text-anchor="middle" class="label-main">LayerNorm (final)</text>

<line class="arrow" x1="320" y1="702" x2="320" y2="728"/>

<!-- ── 7. CLS token extract ────────────────────────────────────────────── -->
<rect class="bg-cls" x="170" y="728" width="300" height="46" rx="6"/>
<text x="320" y="749" text-anchor="middle" class="label-main">Extract [CLS] token</text>
<text x="320" y="766" text-anchor="middle" class="label-sub">representation[:,  0,  :]  →  discard patch tokens</text>

<!-- Side note -->
<rect class="bg-note" x="490" y="734" width="130" height="34" rx="4"/>
<text x="555" y="748" text-anchor="middle" class="label-note">global context</text>
<text x="555" y="762" text-anchor="middle" class="label-note">aggregated here</text>
<line stroke="#9E9E9E" stroke-width="1" x1="490" y1="751" x2="470" y2="751"/>

<line class="arrow" x1="320" y1="774" x2="320" y2="800"/>

<!-- ── 8. Dropout ──────────────────────────────────────────────────────── -->
<rect class="bg-cls" x="210" y="800" width="220" height="34" rx="6"/>
<text x="320" y="822" text-anchor="middle" class="label-main">Dropout</text>

<line class="arrow" x1="320" y1="834" x2="320" y2="860"/>

<!-- ── 9. Dense classifier ─────────────────────────────────────────────── -->
<rect class="bg-head" x="170" y="860" width="300" height="46" rx="6"/>
<text x="320" y="882" text-anchor="middle" class="label-main">Dense  →  Softmax</text>
<text x="320" y="899" text-anchor="middle" class="label-shape">(B, 200)  — 200 Tiny ImageNet classes</text>

<!-- ── Shape flow table ───────────────────────────────────────────────── -->
<rect fill="#FAFAFA" stroke="#BDBDBD" stroke-width="1" x="80" y="930" width="480" height="166" rx="6"/>
<text x="320" y="952" text-anchor="middle" font-family="Arial,sans-serif" font-size="13"
      font-weight="700" fill="#1A237E">Tensor shape flow</text>

<text x="160" y="972" text-anchor="middle" class="label-sub" font-weight="700">Stage</text>
<text x="400" y="972" text-anchor="middle" class="label-sub" font-weight="700">Shape</text>
<line stroke="#BDBDBD" stroke-width="1" x1="90" y1="978" x2="550" y2="978"/>

<text x="160" y="994" text-anchor="middle" class="label-sub">Input</text>
<text x="400" y="994" text-anchor="middle" class="label-shape">(B, 64, 64, 3)</text>

<text x="160" y="1012" text-anchor="middle" class="label-sub">After patching</text>
<text x="400" y="1012" text-anchor="middle" class="label-shape">(B, 64, 192)</text>

<text x="160" y="1030" text-anchor="middle" class="label-sub">After encoding + CLS</text>
<text x="400" y="1030" text-anchor="middle" class="label-shape">(B, 65, proj_dim)</text>

<text x="160" y="1048" text-anchor="middle" class="label-sub">After transformer × L</text>
<text x="400" y="1048" text-anchor="middle" class="label-shape">(B, 65, proj_dim)</text>

<text x="160" y="1066" text-anchor="middle" class="label-sub">CLS token extracted</text>
<text x="400" y="1066" text-anchor="middle" class="label-shape">(B, proj_dim)</text>

<text x="160" y="1084" text-anchor="middle" class="label-sub">Output</text>
<text x="400" y="1084" text-anchor="middle" class="label-shape">(B, 200)</text>

<text x="320" y="1108" text-anchor="middle" class="label-note">
  Improvements: pre-norm · stochastic depth · corrected key_dim · ImageNet standardisation
</text>

</svg>
