<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 980" width="100%" height="980">

<style>
  .bg-input    { fill:#E3F2FD; stroke:#1565C0; stroke-width:1.5 }
  .bg-aug      { fill:#E8F5E9; stroke:#2E7D32; stroke-width:1.5 }
  .bg-frozen   { fill:#E8EAF6; stroke:#3949AB; stroke-width:1.5 }
  .bg-unfreeze { fill:#FFF3E0; stroke:#E65100; stroke-width:1.5 }
  .bg-head     { fill:#FCE4EC; stroke:#880E4F; stroke-width:1.5 }
  .bg-norm     { fill:#EDE7F6; stroke:#4527A0; stroke-width:1.5 }
  .bg-out      { fill:#E0F2F1; stroke:#00695C; stroke-width:1.5 }
  .bg-note     { fill:#F5F5F5; stroke:#9E9E9E; stroke-width:1; stroke-dasharray:4 3 }
  .arrow       { stroke:#455A64; stroke-width:1.8; marker-end:url(#arr) }
  .label-main  { font-family:Arial,sans-serif; font-size:14px; font-weight:700; fill:#212121 }
  .label-sub   { font-family:Arial,sans-serif; font-size:12px; fill:#455A64 }
  .label-shape { font-family:'Courier New',monospace; font-size:11px; fill:#6A1B9A }
  .label-note  { font-family:Arial,sans-serif; font-size:11px; fill:#616161; font-style:italic }
  .phase-label { font-family:Arial,sans-serif; font-size:11px; font-weight:700 }
</style>

<defs>
  <marker id="arr" markerWidth="9" markerHeight="9" refX="8" refY="3" orient="auto">
    <polygon points="0 0, 9 3, 0 6" fill="#455A64"/>
  </marker>
</defs>

<!-- ── Title ────────────────────────────────────────────────────────────── -->
<text x="320" y="28" text-anchor="middle" font-family="Arial,sans-serif"
      font-size="17" font-weight="700" fill="#1A237E">Transfer Learning Architecture</text>
<text x="320" y="46" text-anchor="middle" class="label-sub">EfficientNetV2B0 / ConvNeXtTiny  +  2-phase fine-tuning</text>

<!-- ── 1. Input ─────────────────────────────────────────────────────────── -->
<rect class="bg-input" x="170" y="60" width="300" height="50" rx="6"/>
<text x="320" y="80" text-anchor="middle" class="label-main">Input Image (raw pixels)</text>
<text x="320" y="97" text-anchor="middle" class="label-shape">(B, 64, 64, 3)  uint8 [0 – 255]</text>

<line class="arrow" x1="320" y1="110" x2="320" y2="136"/>

<!-- ── 2. Data augmentation ────────────────────────────────────────────── -->
<rect class="bg-aug" x="150" y="136" width="340" height="62" rx="6"/>
<text x="320" y="156" text-anchor="middle" class="label-main">Data Augmentation Pipeline</text>
<text x="320" y="173" text-anchor="middle" class="label-sub">RandomFlip · RandomRotation · RandomZoom</text>
<text x="320" y="189" text-anchor="middle" class="label-sub">RandomTranslation · RandomBrightness · RandomContrast</text>

<line class="arrow" x1="320" y1="198" x2="320" y2="224"/>

<!-- ── 3. MixUp / CutMix ───────────────────────────────────────────────── -->
<rect class="bg-aug" x="170" y="224" width="300" height="50" rx="6"/>
<text x="320" y="244" text-anchor="middle" class="label-main">MixUp + CutMix (50 / 50)</text>
<text x="320" y="261" text-anchor="middle" class="label-sub">batch-level augmentation applied post-cache</text>

<line class="arrow" x1="320" y1="274" x2="320" y2="300"/>

<!-- ── 4. Embedded preprocessing ──────────────────────────────────────── -->
<rect class="bg-norm" x="170" y="300" width="300" height="50" rx="6"/>
<text x="320" y="320" text-anchor="middle" class="label-main">Backbone Preprocessing  (embedded)</text>
<text x="320" y="337" text-anchor="middle" class="label-sub">EfficientNet: preprocess_input  |  ConvNeXt: ÷127.5 − 1</text>

<!-- Side note -->
<rect class="bg-note" x="490" y="304" width="136" height="38" rx="4"/>
<text x="558" y="319" text-anchor="middle" class="label-note">lives inside the model</text>
<text x="558" y="333" text-anchor="middle" class="label-note">pipeline stays agnostic</text>
<line stroke="#9E9E9E" stroke-width="1" x1="490" y1="320" x2="470" y2="325"/>

<line class="arrow" x1="320" y1="350" x2="320" y2="376"/>

<!-- ── 5. Phase 1 frozen backbone ─────────────────────────────────────── -->
<rect class="bg-frozen" x="120" y="376" width="400" height="124" rx="8"/>
<text x="320" y="396" text-anchor="middle" class="label-main">Pretrained Backbone</text>
<text x="320" y="412" text-anchor="middle" class="label-sub">EfficientNetV2B0  (~5.9 M params)  |  ConvNeXtTiny  (~28 M params)</text>

<!-- Phase 1 zone -->
<rect fill="#E8EAF6" stroke="#3949AB" stroke-width="1" stroke-dasharray="5 3"
      x="138" y="422" width="364" height="34" rx="4"/>
<text x="320" y="434" text-anchor="middle" class="phase-label" fill="#3949AB">Phase 1 — FROZEN</text>
<text x="320" y="448" text-anchor="middle" class="label-sub">all backbone layers locked  ·  only head trains  ·  LR = 1e-3</text>

<!-- Phase 2 zone -->
<rect fill="#FFF3E0" stroke="#E65100" stroke-width="1" stroke-dasharray="5 3"
      x="138" y="462" width="364" height="30" rx="4"/>
<text x="320" y="474" text-anchor="middle" class="phase-label" fill="#E65100">Phase 2 — PARTIAL UNFREEZE  (last 30 layers)</text>
<text x="320" y="488" text-anchor="middle" class="label-sub">slow adaptation  ·  LR = 1e-4  (10× lower)  ·  clipnorm=1.0</text>

<line class="arrow" x1="320" y1="500" x2="320" y2="528"/>

<!-- ── 6. GAP ───────────────────────────────────────────────────────────── -->
<rect fill="#FAFAFA" stroke="#9E9E9E" stroke-width="1.5" x="190" y="528" width="260" height="34" rx="6"/>
<text x="320" y="550" text-anchor="middle" class="label-main">Global Average Pooling 2D</text>

<line class="arrow" x1="320" y1="562" x2="320" y2="588"/>

<!-- ── 7. BatchNorm ────────────────────────────────────────────────────── -->
<rect class="bg-norm" x="210" y="588" width="220" height="32" rx="6"/>
<text x="320" y="609" text-anchor="middle" class="label-main">BatchNormalization</text>

<line class="arrow" x1="320" y1="620" x2="320" y2="646"/>

<!-- ── 8. Dropout ──────────────────────────────────────────────────────── -->
<rect class="bg-head" x="210" y="646" width="220" height="32" rx="6"/>
<text x="320" y="667" text-anchor="middle" class="label-main">Dropout (0.4)</text>

<line class="arrow" x1="320" y1="678" x2="320" y2="704"/>

<!-- ── 9. Dense output ─────────────────────────────────────────────────── -->
<rect class="bg-out" x="170" y="704" width="300" height="48" rx="6"/>
<text x="320" y="724" text-anchor="middle" class="label-main">Dense → Softmax</text>
<text x="320" y="742" text-anchor="middle" class="label-shape">(B, 200)  — 200 Tiny ImageNet classes</text>

<!-- ── Fine-tune schedule panel ───────────────────────────────────────── -->
<rect fill="#FAFAFA" stroke="#BDBDBD" stroke-width="1" x="80" y="778" width="480" height="164" rx="6"/>
<text x="320" y="800" text-anchor="middle" font-family="Arial,sans-serif" font-size="13"
      font-weight="700" fill="#1A237E">Two-phase training schedule</text>

<!-- Phase 1 row -->
<rect fill="#E8EAF6" stroke="#3949AB" stroke-width="1" x="96" y="810" width="448" height="50" rx="4"/>
<text x="200" y="832" text-anchor="middle" class="phase-label" fill="#3949AB">Phase 1</text>
<text x="200" y="848" text-anchor="middle" class="label-sub">~10 epochs</text>
<text x="390" y="832" text-anchor="middle" class="label-sub">backbone frozen  ·  LR = 1e-3</text>
<text x="390" y="848" text-anchor="middle" class="label-sub">goal: teach head without destroying ImageNet weights</text>

<!-- Phase 2 row -->
<rect fill="#FFF3E0" stroke="#E65100" stroke-width="1" x="96" y="868" width="448" height="50" rx="4"/>
<text x="200" y="890" text-anchor="middle" class="phase-label" fill="#E65100">Phase 2</text>
<text x="200" y="906" text-anchor="middle" class="label-sub">20–40 epochs</text>
<text x="390" y="890" text-anchor="middle" class="label-sub">last 30 layers unfrozen  ·  LR = 1e-4</text>
<text x="390" y="906" text-anchor="middle" class="label-sub">goal: adapt backbone to Tiny ImageNet domain</text>

<text x="320" y="958" text-anchor="middle" class="label-note">
  Expected accuracy: EfficientNetV2 pretrained → 82–87%  |  ConvNeXtTiny pretrained → 81–86%
</text>

</svg>
