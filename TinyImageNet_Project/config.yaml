# config.yaml  —  v5
# ===========================================================================
# KEY CHANGE from v4: images are upscaled to 224×224 inside the pipeline.
# batch_size reduced from 128 → 64 because 224×224 images use 12× more VRAM
# than 64×64.  RTX 3060 12GB handles batch_size=64 at 224×224 comfortably.
#
# val_dir MUST point to the organised subfolder (200 class folders).
# ===========================================================================

dataset:
  img_size: 64                               # Native Tiny ImageNet resolution
  num_classes: 200
  train_dir: "data/tiny-imagenet-200/train"
  val_dir:   "data/tiny-imagenet-200/val/images"
  seed: 42


# ===========================================================================
# LAPTOP PROFILE — CPU, 1 epoch smoke test only
# ===========================================================================
laptop:
  model_type: "resnet"
  pretrained: false
  use_gpu: false
  cache_dataset: false
  batch_size: 16
  epochs: 1
  patience: 2
  learning_rate: 0.001
  max_lr: 0.003
  weight_decay: 1.0e-4
  label_smoothing: 0.1
  vit_kwargs:
    patch_size: 8
    projection_dim: 32
    num_heads: 4
    transformer_layers: 2
    dropout_rate: 0.2
  resnet_kwargs:
    base_filters: 32
  efficientnet_kwargs:
    dropout_rate: 0.2
  convnext_kwargs:
    dropout_rate: 0.2


# ===========================================================================
# DESKTOP PROFILE — RTX 3060 12 GB, Core i7 12th gen, 32 GB DDR5
#
# HOW TO RUN:
# ──────────────────────────────────────────────────────────────────────────
# 1. EfficientNet (best accuracy/speed):
#    model_type: "efficientnet", pretrained: true
#    python -m src.fine_tune
#    Expected: Phase1=62–72%  Phase2a=72–80%  Phase2b=75–83%
#
# 2. ConvNeXt:
#    model_type: "convnext", pretrained: true
#    python -m src.fine_tune
#    Expected: Phase1=58–68%  Phase2a=68–76%  Phase2b=72–80%
#
# 3. ResNet from scratch (train.py, not fine_tune.py):
#    model_type: "resnet", pretrained: false
#    python -m src.train
#    Expected: 55–65%  (SE-ResNet, full 200-epoch budget)
#
# 4. Ensemble all trained models:
#    python -m src.ensemble --tta
#    Expected: +2–5 pp over best single model
#
# WHY batch_size=64 (was 128):
#    224×224×3 images use 12.25× more VRAM than 64×64×3.
#    batch_size=128 at 224×224 requires ~10 GB VRAM activation memory.
#    batch_size=64 fits comfortably in 12 GB with headroom for gradients.
# ===========================================================================
desktop:
  model_type: "efficientnet"
  pretrained: true
  use_gpu: true
  cache_dataset: false       # 32 GB RAM — cache 224×224 images (~18 GB needed)

  # ── Training budget ───────────────────────────────────────────────────────
  batch_size: 64            # REDUCED from 128 — 224×224 images need more VRAM
  epochs: 80                # Phase 2b budget (early stopping cuts this short)
  patience: 15              # EarlyStopping patience — more generous at 224×224
  learning_rate: 0.0005
  max_lr: 0.005
  weight_decay: 1.0e-4
  label_smoothing: 0.1

  efficientnet_kwargs:
    dropout_rate: 0.3       # 224×224 gives richer features; 0.3 prevents overfit

  convnext_kwargs:
    dropout_rate: 0.25

  vit_kwargs:
    patch_size: 8
    projection_dim: 64
    num_heads: 8
    transformer_layers: 6
    dropout_rate: 0.3

  resnet_kwargs:
    base_filters: 64
