# config.yaml
# ===========================================================================
# Configuration file for the Tiny ImageNet classification project.
#
# Structure:
#   dataset:   shared paths and dimensions (same for all profiles)
#   laptop:    CPU training — tiny models for fast debugging (Core i7 8th gen)
#   desktop:   GPU training — full-size models (Core i7 12th gen + RTX 3060)
#
# How to switch profiles in train.py:
#   cfg = load_config(profile="laptop")   # or "desktop"
#
# How to switch models within a profile:
#   Change model_type to one of: "vit", "resnet", "efficientnet", "convnext"
# ===========================================================================


# ---------------------------------------------------------------------------
# Shared dataset configuration — used by ALL profiles.
# ---------------------------------------------------------------------------
dataset:
  img_size: 64
  num_classes: 200
  train_dir: "data/tiny-imagenet-200/train"
  val_dir:   "data/tiny-imagenet-200/val/images"
  # Global random seed — pinned here so it appears in every experiment log.
  # Change this to verify your results are stable across seeds.
  seed: 42


# ===========================================================================
# LAPTOP PROFILE — CPU only, small models, 1–2 epochs for smoke testing
# Core i7 8th gen, 16 GB DDR4, integrated GPU (disabled)
# ===========================================================================
laptop:
  # --------------------------------------------------------------------------
  # Model selection.
  # Best choices for the laptop (ranked by what you can actually learn from):
  #   "resnet"  → Fastest to train from scratch.  Converges in ~5 epochs.
  #               Use this to verify the pipeline works end-to-end.
  #   "vit"     → Interesting to experiment with even on CPU.
  #               The improved architecture in models.py fixes the key_dim
  #               bug and adds stochastic depth — noticeable convergence
  #               improvement even on 1–2 epochs.
  #   "efficientnet" / "convnext" → Can run on CPU but very slow.
  #               Only useful with pretrained=false and 1 epoch for sanity checks.
  # --------------------------------------------------------------------------
  model_type: "resnet"
  pretrained: false         # No pretrained weights for laptop (slow download + CPU)
  use_gpu: false
  cache_dataset: false      # Set true only if your laptop has 14+ GB free RAM

  # --- Training hyperparameters ---
  batch_size: 16
  epochs: 1                 # Just enough to verify the pipeline
  patience: 2
  learning_rate: 0.001
  max_lr: 0.003
  weight_decay: 1.0e-4
  label_smoothing: 0.1

  # --- ViT micro architecture (64×64 image with patch_size=8 → 64 patches) ---
  # These are intentionally tiny so 1 epoch finishes in a few minutes on CPU.
  vit_kwargs:
    patch_size: 8
    projection_dim: 32      # Tiny embedding — just enough to learn something
    num_heads: 4             # Must divide projection_dim: 32 / 4 = 8 (key_dim)
    transformer_layers: 2   # Very shallow; deeper = slower on CPU
    dropout_rate: 0.2

  resnet_kwargs:
    base_filters: 32        # Half the desktop filter count

  efficientnet_kwargs:
    dropout_rate: 0.2

  convnext_kwargs:
    dropout_rate: 0.2


# ===========================================================================
# DESKTOP PROFILE — RTX 3060 12 GB VRAM, full-size models
# Core i7 12th gen, 32 GB DDR5
# ===========================================================================
desktop:
  # --------------------------------------------------------------------------
  # Recommended training order for best accuracy:
  #
  #   STEP 1 — Run fine_tune.py with "efficientnet" + pretrained: true
  #             Expected accuracy: 82–87%
  #             EfficientNetV2B0 has the best speed/accuracy trade-off on
  #             your hardware and is the go-to choice for transfer learning.
  #
  #   STEP 2 — Try "convnext" + pretrained: true
  #             Expected accuracy: 81–86%  (sometimes 1–2 pp better than EfficientNet
  #             with a larger epoch budget)
  #
  #   STEP 3 — Try "vit" — but use fine_tune.py and a DeiT pretrained checkpoint.
  #             ViT from scratch on 100k images peaks ~68–72% even with all
  #             improvements in models.py.
  #
  #   STEP 4 — Ensemble: average the softmax outputs of your two best models.
  #             This alone typically adds +1–3 pp for free.
  # --------------------------------------------------------------------------
  model_type: "resnet"
  pretrained: false          # CRITICAL for 80%+ accuracy — loads ImageNet weights
  use_gpu: true
  cache_dataset: true       # 32 GB RAM → can cache the full dataset easily

  # --- Training hyperparameters ---
  # These are for fine_tune.py Phase 2 (fine-tuning).
  # Phase 1 (head-only) overrides learning_rate to 1e-3 internally.
  batch_size: 128
  epochs: 100                # Phase 2 epochs; early stopping will cut this short
  patience: 12
  learning_rate: 0.0005
  max_lr: 0.005
  weight_decay: 1.0e-4
  label_smoothing: 0.1

  # --- EfficientNet desktop config ---
  efficientnet_kwargs:
    dropout_rate: 0.4       # Higher dropout for the larger model

  # --- ConvNeXt desktop config ---
  convnext_kwargs:
    dropout_rate: 0.4

  # --- ViT full-size architecture ---
  # These settings assume you are using pretrained DeiT weights loaded
  # externally (see README for instructions).  Training ViT from scratch
  # with these settings will take days and peak ~68–72%.
  vit_kwargs:
    patch_size: 8
    projection_dim: 128     # Large embedding for the GPU model
    num_heads: 8            # 128 / 8 = 16 (key_dim per head)
    transformer_layers: 8   # Deep stack for the full GPU run
    dropout_rate: 0.4

  resnet_kwargs:
    base_filters: 64        # Standard ResNet filter count
